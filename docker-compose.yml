version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: persona
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: persona_ai
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U persona -d persona_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      DATABASE_URL: postgres://persona:secret@db:5432/persona_ai
      SESSION_SECRET: ${SESSION_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY:-placeholder}
      RESEND_FROM: ${RESEND_FROM:-noreply@localhost}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:5173}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-}
      DEV_CORS: "true"
      RUST_ENV: development
      RUST_LOG: info,persona_ai=debug,sqlx=warn
    volumes:
      - model_data:/data/models
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: http://localhost:8080

volumes:
  pg_data:
  model_data:
